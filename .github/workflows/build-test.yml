name: Build Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# Restrict default permissions to read-only.
# This limits the blast radius if a compromised action tries to
# modify repo contents, create releases, or exfiltrate secrets.
permissions:
  contents: read

jobs:

  build-debian-stable:
    name: Debian Stable
    runs-on: ubuntu-latest
    steps:
    # Pin actions to commit SHAs to prevent supply chain attacks
    # via mutable tags. Verify SHAs at:
    # https://github.com/actions/checkout/tags
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Create Build Environment
      run: cd .github/ci/ && podman build -t ttyx -f ./Dockerfile-debian-stable .

    - name: Build
      run: podman run -t -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build ttyx
           ./.github/ci/run-build.sh

    - name: Test
      run: podman run -t -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build ttyx
           ./.github/ci/run-tests.sh


  build-debian-testing:
    name: Debian Testing
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Create Build Environment
      run: cd .github/ci/ && podman build -t ttyx -f ./Dockerfile-debian-testing .

    - name: Build
      run: podman run -t -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build ttyx
           ./.github/ci/run-build.sh

    - name: Test
      run: podman run -t -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build ttyx
           ./.github/ci/run-tests.sh


  build-ubuntu:
    name: Ubuntu LTS
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Create Build Environment
      run: cd .github/ci/ && podman build -t ttyx -f ./Dockerfile-ubuntu-noble .

    - name: Build
      run: podman run -t -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build ttyx
           ./.github/ci/run-build.sh

    - name: Test
      run: podman run -t -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build ttyx
           ./.github/ci/run-tests.sh

    - name: Memory Footprint
      continue-on-error: true
      run: podman run -t -e CC=gcc -e CXX=g++ -v `pwd`:/build ttyx
           ./.github/ci/measure-memory.sh


  build-dub-ubuntu:
    name: Dub
    runs-on: ubuntu-latest
    strategy:
        matrix:
          dc: [ldc-latest]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install System Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -yq \
                libatk1.0-dev \
                libcairo2-dev \
                libglib2.0-dev \
                libgtk-3-dev \
                libpango1.0-dev \
                librsvg2-dev \
                libsecret-1-dev \
                libvte-2.91-dev \
                xvfb

    # https://github.com/dlang-community/setup-dlang/tags
    - name: Install D compiler
      uses: dlang-community/setup-dlang@0a7469b93f791d83f30932c6fd105796c6966e20 # v2.0.0
      with:
        compiler: ${{ matrix.dc }}

    - name: Build
      run: dub build --compiler=$DC

    - name: Test
      run: xvfb-run dub test --compiler=$DC

    - name: GC Profile
      run: |
        OUTPUT=$(xvfb-run dub test --compiler=$DC -- --DRT-gcopt=profile:1 2>&1)
        GC_LINE=$(echo "$OUTPUT" | grep "GC summary" || echo "GC summary: not available")
        echo "### GC profile (${{ matrix.dc }})" >> "$GITHUB_STEP_SUMMARY"
        printf '```\n%s\n```\n' "$GC_LINE" >> "$GITHUB_STEP_SUMMARY"
