id: io.github.gwelr.ttyx
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: ttyx
finish-args:
  # Display (prefer Wayland, fall back to X11)
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # PTY/terminal device access
  - --device=all
  # Host shell execution via flatpak-spawn
  - --talk-name=org.freedesktop.Flatpak
  # Secrets (for password storage)
  - --talk-name=org.freedesktop.secrets
  # D-Bus own name for single-instance
  - --own-name=io.github.gwelr.ttyx
  # DConf access for GSettings
  - --filesystem=xdg-run/dconf
  - --filesystem=~/.config/dconf:ro
  - --talk-name=ca.desrt.dconf
  - --env=DCONF_USER_CONFIG_DIR=.config/dconf
  # Home directory access (terminal needs to browse files)
  - --filesystem=home

build-options:
  append-path: /app/ldc/bin
  append-ld-library-path: /app/ldc/lib

cleanup:
  - /ldc
  - /include
  - /lib/pkgconfig
  - /lib/debug
  - /share/gtk-doc
  - /share/man
  - /share/vala
  - /share/gir-1.0
  - '*.la'
  - '*.a'

modules:
  # LDC compiler (self-contained, statically links LLVM)
  - name: ldc
    buildsystem: simple
    build-commands:
      - mkdir -p /app/ldc
      - mv bin etc import lib LICENSE /app/ldc/
    sources:
      - type: archive
        url: https://github.com/ldc-developers/ldc/releases/download/v1.39.0/ldc2-1.39.0-linux-x86_64.tar.xz
        sha256: f50cdacd11c923b96e57edab15cacff6a30c7ebff4b7e495fc684eed0a27ae17
    cleanup:
      - '*'

  # VTE terminal widget (GTK3 build)
  - name: vte
    buildsystem: meson
    config-opts:
      - -Dgtk3=true
      - -Dgtk4=false
      - -Dvapi=false
      - -Dgir=false
      - -D_systemd=false
      - --libdir=lib
    sources:
      - type: archive
        url: https://download.gnome.org/sources/vte/0.76/vte-0.76.3.tar.xz
        sha256: f678e94c056f377fd0021214adff5450cb172e9a08b160911181ddff7b7d5d60


  # Toolbox helper for flatpak-specific operations (passwd lookup, PID, proc)
  - name: toolbox
    buildsystem: simple
    build-commands:
      - gcc -o /app/bin/ttyx-flatpak-toolbox ttyx-flatpak-toolbox.c
    sources:
      - type: file
        path: ttyx-flatpak-toolbox.c

  # ttyx_ terminal emulator — built with dub against the giD bindings
  # (gid is a source-only dub package; it is vendored below as an archive so
  # the sandboxed build needs no network: dub add-local + --skip-registry=all).
  # NOTE: the referenced git tag must contain the giD build (dub.json depends
  # on gid:*), i.e. a release cut after the migrate/gid-build-swap merge.
  - name: ttyx
    buildsystem: simple
    build-options:
      env:
        DC: ldc2
    build-commands:
      - export DUB_HOME=$PWD/.dub && dub add-local vendor/gid 0.9.13 &&
        dub build --compiler=ldc2 --build=release --skip-registry=all
      - PREFIX=/app ./install.sh /app
      # Copy D runtime shared libs before /ldc cleanup removes them
      - cp -P /app/ldc/lib/libphobos2-ldc-shared.so* /app/lib/
      - cp -P /app/ldc/lib/libdruntime-ldc-shared.so* /app/lib/
    sources:
      - type: git
        url: https://github.com/gwelr/ttyx_.git
        tag: v1.2.0-beta.1
      # giD 0.9.13 dub package, vendored for the offline sandbox build
      - type: archive
        url: https://code.dlang.org/packages/gid/0.9.13.zip
        sha256: 04b537f0a63938d831121af3c2e848564ec99d321e7e710932636e47e00f99aa
        dest: vendor/gid
